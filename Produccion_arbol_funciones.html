            svg.call(d3.zoom().scaleExtent([0.1, 3]).on("zoom", (e) => g.attr("transform", e.transform)));

            const tree = d3.tree().nodeSize([25, 300]);
            const root = d3.hierarchy(data);
            tree(root);

            g.selectAll(".link")
                .data(root.links())
                .enter().append("path")
                .attr("class", "link")
                .attr("d", d3.linkHorizontal().x(d => d.y).y(d => d.x));

            const node = g.selectAll(".node")
                .data(root.descendants())
                .enter().append("g")
                .attr("class", d => {
                    let cls = "node " + (d.children ? "node--internal" : "node--leaf");
                    // Aplicar clase roja si mexico === 'NO'
                    if (d.data.mexico === "NO") cls += " node--no-mexico";
                    return cls;
                })
                .attr("transform", d => `translate(${d.y}, ${d.x})`);

            node.append("circle").attr("r", 5);
            node.append("text")
                .attr("dy", "0.31em")
                .attr("x", d => d.children ? -10 : 10)
                .attr("text-anchor", d => d.children ? "end" : "start")
                .text(d => d.data.name);

            svg.call(d3.zoom().transform, d3.zoomIdentity.translate(150, window.innerHeight/2).scale(0.7));
